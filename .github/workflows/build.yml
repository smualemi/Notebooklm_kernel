name: Build OnePlus 9 Pro Stock Kernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-20.04

    steps:
      - name: Maximize Runner Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc zip libssl-dev libfl-dev curl bison flex lz4 cpio python3 python-is-python3

      - name: Clone Source and Toolchains
        run: |
          mkdir -p ${{ github.workspace }}/workspace
          cd ${{ github.workspace }}/workspace

          # Clone Kernel Source
          git clone --depth=1 -b oneplus/sm8350_u_14.0.0_oneplus9 https://github.com/OnePlusOSS/android_kernel_oneplus_sm8350.git kernel

          # Clone AOSP Clang 11.0.2 (r383902b1) efficiently using sparse-checkout
          mkdir clang-toolchain
          cd clang-toolchain
          git clone --depth=1 --filter=blob:none --sparse https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 .
          git sparse-checkout set clang-r383902b1
          cd ..

          # Clone LineageOS GCC 64-bit wrapper
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc-arm64

          # Clone LineageOS GCC 32-bit wrapper
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 gcc-arm32

          # Clone AnyKernel3
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 kernel-zip

      - name: Prepare Kernel Configuration
        run: |
          cd ${{ github.workspace }}/workspace/kernel
          cp ${{ github.workspace }}/stock_config.txt arch/arm64/configs/stock_defconfig

      - name: Compile Kernel
        run: |
          cd ${{ github.workspace }}/workspace/kernel

          # Setup Environment Variables with CORRECT PATH
          export PATH="${{ github.workspace }}/workspace/clang-toolchain/clang-r383902b1/bin:${{ github.workspace }}/workspace/gcc-arm64/bin:${{ github.workspace }}/workspace/gcc-arm32/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export LLVM=1
          export LLD=1

          # Apply Configuration
          make O=out ARCH=arm64 \
            CC=clang \
            LLVM=1 \
            LLD=1 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            stock_defconfig

          # Build Kernel Image
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC=clang \
            LLVM=1 \
            LLD=1 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            Image

      - name: Repack AnyKernel3
        run: |
          cd ${{ github.workspace }}/workspace/kernel-zip

          # Copy compiled kernel Image
          cp ../kernel/out/arch/arm64/boot/Image .

          # Configure AnyKernel3 for OnePlus 9 Pro
          sed -i 's/device.name1=.*/device.name1=lemonadep/' anykernel.sh

          # Remove unneeded directories and create flashable zip
          rm -rf patch ramdisk .git
          zip -r9 ../lemonadep-stock-kernel-A14.zip *

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lemonadep-stock-kernel-A14
          path: ${{ github.workspace }}/workspace/lemonadep-stock-kernel-A14.zip
